<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards Filter</title>
    <link rel="stylesheet" href="css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css"
        integrity="sha384-B4dIYHKNBt8Bc12p+WXckhzcICo0wtJAoU8YZTY5qE0Id1GSseTk6S+L3BlXeVIU" crossorigin="anonymous" />
    <script type="module" src="js/main.js"></script>
</head>

<body>
    <div class="contenedor-principal">
        <!-- filtros -->
        <div class="contenedor-filtros" id="filtros">
            <div class="contenedor-input">
                <i class="bx bx-search"></i>
                <input type="text" name="search" id="search" placeholder="Búsqueda">
            </div>

            <div class="contenedor-botones" id="botones">
                <button class="btn active" data-filtro="todo">Todo</button>
                <button class="btn" data-filtro="peliculas">Peliculas</button>
                <button class="btn" data-filtro="series">Series</button>
                <button class="btn" data-filtro="videojuegos">Videojuegos</button>
            </div>
        </div>

        <!-- contenedor cards -->
        <div class="contenedor-cards" id="contenedor-cards">
        </div>
    </div>

    <!-- Modal -->  
    <div class="modal" id="modal">
        <div class="modal-content">
            <span id="close" class="close">&times;</span>
            <img src="" alt="" id="img-modal" class="img-modal">
        </div>
    </div>
</body>

</html>
